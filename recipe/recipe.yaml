context:
  build_number: 0
  name: ocaml-findlib
  version: 1.9.8
  library: ${{ "Library/" if not unix else "" }}
  m2: ${{ "m2-" if not unix else "" }}
  sh: ${{ "sh" if unix else "bat" }}

package:
  name: ocaml-findlib
  version: ${{ version }}

source:
  url: http://download.camlcity.org/download/findlib-${{ version }}.tar.gz
  sha256: 662c910f774e9fee3a19c4e057f380581ab2fc4ee52da4761304ac9c31b8869d

build:
  number: ${{ build_number }}
  prefix_detection:
    force_file_type:
      text:
        - ${{ library }}lib/ocaml/site-lib/findlib/Makefile.config
        - ${{ library }}lib/ocaml/topfind
        - ${{ library }}etc/findlib.conf
    ignore:
      # Only ignore bytecode files (binary format, relocation corrupts them)
      - ${{ library }}lib/ocaml/site-lib/**/*.cma
      - ${{ library }}lib/ocaml/site-lib/**/*.cmi
      - ${{ library }}lib/ocaml/site-lib/**/*.cmx
      - ${{ library }}lib/ocaml/site-lib/**/*.cmt
      - ${{ library }}lib/ocaml/site-lib/**/*.cmti

requirements:
  build:
    - ${{ compiler('ocaml') }}
    - ocaml_${{ build_platform }} >=5.4.0 *_6   # Temporary fix until compiler() installs native
    - ${{ m2 }}bash >=5.2
    - ${{ m2 }}make
    - ${{ m2 }}sed
    - ${{ m2 }}grep
    # - if: build_platform != target_platform
    #   then:
    #     - ocaml_${{ target_platform }} >=5.4.0
    # - if: osx
    #   then:
    #    - lld
    #    - llvm-tools
  run_constraints:
    - ocaml_${{ target_platform }} >=5.4.0 *_6

tests:
  - package_contents:
      strict: true
      bin:
        - ocamlfind
      files:
        - ${{ library }}etc/findlib.conf
        - ${{ library }}lib/ocaml/site-lib/bytes/META
        - ${{ library }}lib/ocaml/site-lib/findlib/META
        - ${{ library }}lib/ocaml/site-lib/findlib/Makefile.config
        - ${{ library }}lib/ocaml/site-lib/findlib/Makefile.packages
        - ${{ library }}lib/ocaml/site-lib/findlib/findlib.cma
        - ${{ library }}lib/ocaml/site-lib/findlib/findlib.cmxa
        - ${{ library }}lib/ocaml/site-lib/findlib/findlib_top.cma
        - ${{ library }}lib/ocaml/site-lib/findlib/findlib*
        - ${{ library }}lib/ocaml/site-lib/findlib/fl*
        - ${{ library }}lib/ocaml/site-lib/findlib/ocaml_args.cmi
        - ${{ library }}lib/ocaml/site-lib/findlib/topfind.cmi
        - ${{ library }}lib/ocaml/site-lib/findlib/topfind.mli
        - ${{ library }}share/man/man1/ocamlfind.1
        - ${{ library }}share/man/man5/META.5
        - ${{ library }}share/man/man5/findlib.conf.5
        - ${{ library }}share/man/man5/site-lib.5
        - ${{ library }}lib/ocaml/topfind

        - etc/conda/activate.d/ocaml-findlib_activate.${{ sh }}
        - etc/conda/deactivate.d/ocaml-findlib_deactivate.${{ sh }}
        - etc/conda/test-files/*
        
  # Cross-compilation tests (Linux, run via QEMU emulation)
  - if: unix and (build_platform != target_platform)
    then:
      script:
        - bash testing/test_cross.sh
      requirements:
        run:
          - file
          - ocaml-compiler
      files:
        recipe:
          - testing/test_cross.sh

  # Native Unix tests (Linux/macOS, full test suite)
  - if: unix and (build_platform == target_platform)
    then:
      script:
        - bash testing/test_native.sh
      requirements:
        run:
          - ${{ c_compiler }}_impl_${{ target_platform }}
          - ${{ m2 }}grep
          - ocaml-compiler
          - if: osx
            then:
              - lld
              - llvm-tools
      files:
        recipe:
          - testing/test_native.sh

  # non-unix tests (Python - cross-platform, robust)
  - if: not unix
    then:
      script:
        - python testing/test-findlib.py
      requirements:
        run:
          - python >=3.9
          - ocaml-compiler
      files:
        recipe:
          - testing/test-findlib.py

about:
  homepage: http://projects.camlcity.org/projects/findlib.html
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'OCaml library manager and package finder'
  documentation: http://projects.camlcity.org/projects/dl/findlib-${{ version }}/doc/guide-html/index.html
  repository: https://github.com/ocaml/ocamlfind

extra:
  recipe-maintainers:
    - dslarm
    - isuruf
    - slel
    - MementoRC
